<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - AIRGO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e27;
            background-image: 
                /* Dark overlay for readability */
                linear-gradient(rgba(10, 14, 39, 0.85), rgba(10, 14, 39, 0.85)),
                /* Airport terminal/runway gradient pattern */
                linear-gradient(135deg, 
                    rgba(20, 30, 80, 0.8) 0%, 
                    rgba(10, 20, 50, 0.9) 50%,
                    rgba(30, 40, 90, 0.8) 100%
                ),
                /* Simulated airport lights */
                radial-gradient(ellipse at 20% 30%, rgba(0, 201, 167, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 200, 100, 0.1) 0%, transparent 60%);
            min-height: 100vh;
            color: white;
            position: relative;
            overflow: hidden;
        }

        /* Animated runway lights effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    90deg,
                    transparent 0px,
                    transparent 150px,
                    rgba(0, 201, 167, 0.03) 150px,
                    rgba(0, 201, 167, 0.03) 152px
                );
            animation: runway 20s linear infinite;
            pointer-events: none;
            opacity: 0.3;
        }

        @keyframes runway {
            from { transform: translateX(0); }
            to { transform: translateX(152px); }
        }

        /* Subtle airplane taxiing effect */
        body::after {
            content: '✈️';
            position: fixed;
            font-size: 40px;
            top: 20%;
            left: -50px;
            opacity: 0.15;
            filter: blur(2px);
            animation: taxiing 25s linear infinite;
            pointer-events: none;
        }

        @keyframes taxiing {
            0% { 
                left: -50px;
                top: 20%;
            }
            100% { 
                left: calc(100% + 50px);
                top: 25%;
            }
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { 
                opacity: 0;
                backdrop-filter: blur(0px);
            }
            to { 
                opacity: 1;
                backdrop-filter: blur(8px);
            }
        }

        /* Animated Background Orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 15s ease-in-out infinite;
            z-index: 0;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #00c9a7, #06d6a0);
            bottom: -80px;
            right: -80px;
            animation-delay: 5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            z-index: 1;
            animation: confetti-fall linear forwards;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Success Container */
        .success-container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 500px;
            width: 100%;
            padding: 45px 35px;
            background: linear-gradient(135deg,
                rgba(10, 14, 39, 0.98) 0%,
                rgba(20, 25, 60, 0.98) 100%
            );
            border: 3px solid rgba(0, 201, 167, 0.4);
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .success-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #00c9a7, #667eea, #ff6b9d);
            border-radius: 30px 30px 0 0;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Success Icon */
        .success-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
            background: linear-gradient(135deg, #00c9a7, #06d6a0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 
                0 15px 40px rgba(0, 201, 167, 0.5),
                inset 0 5px 10px rgba(255, 255, 255, 0.3);
            animation: iconPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.2s both;
            position: relative;
        }

        .success-icon::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid #00c9a7;
            animation: ripple 1.5s ease-out infinite;
        }

        @keyframes iconPop {
            from {
                transform: scale(0) rotate(-180deg);
            }
            to {
                transform: scale(1) rotate(0deg);
            }
        }

        @keyframes ripple {
            from {
                transform: scale(1);
                opacity: 1;
            }
            to {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        /* Text Content */
        .success-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #00c9a7, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: fadeIn 0.5s ease 0.3s both;
        }

        .success-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 25px;
            line-height: 1.5;
            animation: fadeIn 0.5s ease 0.4s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Booking Details */
        .booking-details {
            background: rgba(0, 201, 167, 0.08);
            border: 2px solid rgba(0, 201, 167, 0.3);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 25px;
            animation: fadeIn 0.5s ease 0.5s both;
        }

        .booking-ref {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .booking-code {
            font-size: 26px;
            font-weight: 900;
            color: #00c9a7;
            text-shadow: 0 0 20px rgba(0, 201, 167, 0.6);
            letter-spacing: 3px;
        }

        .flight-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 201, 167, 0.2);
        }

        .flight-city {
            font-size: 20px;
            font-weight: 900;
            color: white;
        }

        .flight-arrow {
            font-size: 20px;
            color: #00c9a7;
        }

        /* Perk Badge */
        .perk-badge {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, 
                rgba(255, 107, 53, 0.2) 0%,
                rgba(255, 140, 66, 0.1) 100%
            );
            border: 2px solid rgba(255, 107, 53, 0.4);
            border-radius: 50px;
            margin-top: 15px;
            margin-bottom: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: fadeIn 0.5s ease 0.6s both, glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3); }
            50% { box-shadow: 0 6px 25px rgba(255, 107, 53, 0.6); }
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.5s ease 0.7s both;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00c9a7, #06d6a0);
            color: #0a0e27;
            box-shadow: 0 8px 25px rgba(0, 201, 167, 0.5);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 201, 167, 0.7);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(0, 201, 167, 0.4);
        }

        /* Email Sent Badge */
        .email-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 12px;
            animation: fadeIn 0.5s ease 0.9s both;
        }

        @media (max-width: 768px) {
            .success-container {
                padding: 40px 25px;
                margin: 20px;
            }

            .success-title {
                font-size: 28px;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Background Orbs -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <!-- Modal Overlay -->
    <div class="modal-overlay">
        <!-- Success Container -->
        <div class="success-container">
        <!-- Success Icon -->
        <div class="success-icon">✈️</div>

        <!-- Success Message -->
        <h1 class="success-title">BOOKING CONFIRMED</h1>
        <p class="success-subtitle">
            Your flight has been successfully booked! <br>
            Confirmation details have been sent to your email.
        </p>

        <!-- Booking Details -->
        <div class="booking-details">
            <div class="booking-ref">BOOKING REFERENCE</div>
            <div class="booking-code" id="bookingRef">AIRGO-XXXXXX</div>
            
            <div class="flight-info">
                <div class="flight-city" id="origin">LOS</div>
                <div class="flight-arrow">✈️</div>
                <div class="flight-city" id="destination">ABV</div>
            </div>

            <div class="email-badge">
                <span>📧</span>
                <span>E-ticket sent to <span id="userEmail">your email</span></span>
            </div>
        </div>

        <!-- Perk Badge -->
        <div class="perk-badge" id="perkBadge">
            🎁 BOOKING REWARD UNLOCKED
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <a href="my-trips.html" class="btn btn-primary">
                View My Trips
            </a>
            <a href="index.html" class="btn btn-secondary">
                Book Another Flight
            </a>
        </div>
    </div>
    </div>

    <script>
        // Create holographic confetti
        function createConfetti() {
            const colors = ['#00c9a7', '#667eea', '#ff6b9d', '#06d6a0', '#764ba2', '#FFD700'];
            const confettiCount = 150;

            for (let i = 0; i < confettiCount; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    confetti.style.animationDelay = Math.random() * 0.5 + 's';
                    confetti.style.width = (Math.random() * 10 + 5) + 'px';
                    confetti.style.height = confetti.style.width;
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    confetti.style.opacity = Math.random() * 0.5 + 0.5;
                    
                    document.body.appendChild(confetti);

                    // Remove after animation
                    setTimeout(() => confetti.remove(), 5000);
                }, i * 15);
            }
        }

        // Get booking details from URL or localStorage
        function loadBookingDetails() {
            const params = new URLSearchParams(window.location.search);
            const bookingRef = params.get('ref') || 'AIRGO-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            const origin = params.get('origin') || 'LOS';
            const destination = params.get('destination') || 'ABV';
            const email = params.get('email');

            // Check localStorage for most recent booking
            const bookings = JSON.parse(localStorage.getItem('airgo_bookings') || '[]');
            const latestBooking = bookings[bookings.length - 1];

            if (latestBooking) {
                document.getElementById('bookingRef').textContent = latestBooking.bookingReference;
                document.getElementById('origin').textContent = latestBooking.origin;
                document.getElementById('destination').textContent = latestBooking.destination;
                if (latestBooking.email) {
                    document.getElementById('userEmail').textContent = latestBooking.email;
                }
            } else {
                document.getElementById('bookingRef').textContent = bookingRef;
                document.getElementById('origin').textContent = origin;
                document.getElementById('destination').textContent = destination;
                if (email) {
                    document.getElementById('userEmail').textContent = email;
                }
            }

            // Show appropriate perk
            const settings = JSON.parse(localStorage.getItem('airgo_settings') || '{}');
            const perks = JSON.parse(localStorage.getItem('airgo_perks') || '[]');

            let perkMessage = '🎁 BOOKING REWARD UNLOCKED';
            
            if (bookings.length === 0) {
                perkMessage = '🌟 FIRST FLIGHT - VERIFIED TRAVELER STATUS';
            } else if (bookings.length === 1) {
                perkMessage = '⚡ EARLY BOOKING - BETTER RECOMMENDATIONS';
            } else if (bookings.length >= 4) {
                perkMessage = '🎯 FREQUENT FLYER - PRIORITY ALERTS ENABLED';
            }

            document.getElementById('perkBadge').textContent = perkMessage;
        }

        // Initialize
        createConfetti();
        loadBookingDetails();

        // Play success sound (optional - browser may block)
        try {
            const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLaijYIGGm98OScTgwOUKfd8LNgGgU');
            audio.volume = 0.3;
            audio.play().catch(() => {});
        } catch(e) {}
    </script>
</body>
</html>
