<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trips - AIRGO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e27;
            background-image: 
                radial-gradient(ellipse at 50% 0%, rgba(102, 126, 234, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(118, 75, 162, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(0, 201, 167, 0.2) 0%, transparent 50%);
            min-height: 100vh;
            color: white;
        }

        /* Animated Background Orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 15s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #00c9a7, #06d6a0);
            bottom: -80px;
            right: -80px;
            animation-delay: 5s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #ff6b9d, #c471ed);
            top: 40%;
            right: 10%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .container {
            max-width: 1200px;
            width: 95%;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.1) 0%,
                rgba(255, 255, 255, 0.05) 100%
            );
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 15px 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .logo-chrome {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #00c9a7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6); }
            50% { box-shadow: 0 8px 30px rgba(0, 201, 167, 0.8); }
        }

        .logo-text {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, #00c9a7, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .top-nav {
            display: flex;
            gap: 12px;
        }

        .top-nav-btn {
            padding: 12px 28px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .top-nav-btn:hover {
            background: rgba(0, 201, 167, 0.15);
            border-color: rgba(0, 201, 167, 0.4);
            color: #00c9a7;
            transform: translateY(-2px);
        }

        .top-nav-btn.active {
            background: linear-gradient(135deg, #00c9a7, #06d6a0);
            border-color: #00c9a7;
            color: #0a0e27;
            box-shadow: 0 4px 15px rgba(0, 201, 167, 0.4);
        }

        /* Traveler Status Card (Reward System) */
        .status-card {
            background: linear-gradient(135deg,
                rgba(0, 201, 167, 0.2) 0%,
                rgba(102, 126, 234, 0.1) 100%
            );
            border: 2px solid rgba(0, 201, 167, 0.4);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0, 201, 167, 0.3);
            position: relative;
            overflow: hidden;
        }

        .status-card::before {
            content: '✈️';
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 120px;
            opacity: 0.1;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(135deg, #00c9a7, #06d6a0);
            border-radius: 50px;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #0a0e27;
            box-shadow: 0 4px 15px rgba(0, 201, 167, 0.5);
        }

        .status-perks {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .perk-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
        }

        .perk-icon {
            font-size: 20px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(135deg,
                rgba(10, 14, 39, 0.9) 0%,
                rgba(20, 25, 60, 0.9) 100%
            );
            border: 2px solid rgba(0, 201, 167, 0.3);
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #00c9a7;
            box-shadow: 0 12px 35px rgba(0, 201, 167, 0.4);
        }

        .stat-number {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #00c9a7, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Section Title */
        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #00c9a7;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Trip Cards */
        .trips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            margin-bottom: 50px;
        }

        .trip-card {
            background: linear-gradient(135deg,
                rgba(10, 14, 39, 0.95) 0%,
                rgba(20, 25, 60, 0.95) 100%
            );
            border: 2px solid rgba(0, 201, 167, 0.3);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .trip-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00c9a7, #667eea, #ff6b9d);
        }

        .trip-card:hover {
            transform: translateY(-5px);
            border-color: #00c9a7;
            box-shadow: 0 15px 40px rgba(0, 201, 167, 0.4);
        }

        .trip-status {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .trip-status.upcoming {
            background: linear-gradient(135deg, #00c9a7, #06d6a0);
            color: #0a0e27;
            box-shadow: 0 4px 15px rgba(0, 201, 167, 0.4);
        }

        .trip-status.completed {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .countdown {
            background: linear-gradient(135deg, #FF8C42, #FF6B35);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 16px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
        }

        .flight-header {
            margin-bottom: 20px;
        }

        .trip-airline {
            font-size: 20px;
            font-weight: 900;
            background: linear-gradient(135deg, #00c9a7, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .trip-flight-number {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .trip-route {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 201, 167, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(0, 201, 167, 0.2);
        }

        .trip-location {
            text-align: center;
            flex: 1;
        }

        .trip-city {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 201, 167, 0.6);
            margin-bottom: 4px;
        }

        .trip-time {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        .trip-arrow {
            font-size: 28px;
            color: #00c9a7;
            text-shadow: 0 0 15px rgba(0, 201, 167, 0.8);
            margin: 0 15px;
        }

        .trip-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
            font-size: 13px;
        }

        .trip-detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .trip-detail-label {
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .trip-detail-value {
            color: #fff;
            font-weight: 700;
        }

        .trip-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .trip-btn {
            flex: 1;
            padding: 14px;
            border-radius: 50px;
            border: none;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Orbitron', sans-serif;
        }

        .trip-btn-primary {
            background: linear-gradient(135deg, #00c9a7, #06d6a0);
            color: #0a0e27;
            box-shadow: 0 4px 15px rgba(0, 201, 167, 0.4);
        }

        .trip-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 201, 167, 0.6);
        }

        .trip-btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .trip-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(0, 201, 167, 0.4);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(135deg,
                rgba(10, 14, 39, 0.9) 0%,
                rgba(20, 25, 60, 0.9) 100%
            );
            border: 2px solid rgba(0, 201, 167, 0.3);
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(0, 201, 167, 0.6));
        }

        .empty-state h3 {
            font-size: 24px;
            color: #00c9a7;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .empty-state p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
            margin-bottom: 30px;
        }

        .empty-state-btn {
            padding: 16px 40px;
            background: linear-gradient(135deg, #00c9a7, #06d6a0);
            color: #0a0e27;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 8px 25px rgba(0, 201, 167, 0.5);
            transition: all 0.3s ease;
        }

        .empty-state-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 201, 167, 0.7);
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            .trips-grid {
                grid-template-columns: 1fr;
            }

            .top-nav {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Background Orbs -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo-section">
                <img src="airgo-logo.png" alt="AIRGO" style="height:45px; object-fit:contain; filter:drop-shadow(0 3px 12px rgba(0,201,167,0.5));">
            </div>

            <div class="top-nav">
                <a href="index.html" class="top-nav-btn">
                    💬 Chat
                </a>
                <a href="my-trips.html" class="top-nav-btn active">
                    ✈️ My Trips
                </a>
                <a href="index.html" class="top-nav-btn">
                    📜 History
                </a>
                <a href="settings-y2k.html" class="top-nav-btn">
                    ⚙️ Settings
                </a>
            </div>
        </div>

        <!-- Traveler Status (Reward System) -->
        <div class="status-card" id="statusCard" style="display: none;">
            <div class="status-header">
                <h2 style="font-size: 20px; color: #00c9a7; text-transform: uppercase; letter-spacing: 2px;">TRAVELER STATUS</h2>
                <span class="status-badge" id="statusBadge">VERIFIED TRAVELER</span>
            </div>
            <div class="status-perks" id="statusPerks">
                <!-- Dynamic perks will be inserted here -->
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-number" id="upcomingCount">0</div>
                <div class="stat-label">Upcoming Flights</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">Completed Trips</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalSpent">₦0</div>
                <div class="stat-label">Total Invested</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="onTimeRate">--</div>
                <div class="stat-label">On-Time Record</div>
            </div>
        </div>

        <!-- Upcoming Trips -->
        <div id="upcomingSection">
            <h2 class="section-title">🛫 UPCOMING FLIGHTS</h2>
            <div class="trips-grid" id="upcomingTrips"></div>
        </div>

        <!-- Past Trips -->
        <div id="pastSection">
            <h2 class="section-title">📋 FLIGHT HISTORY</h2>
            <div class="trips-grid" id="pastTrips"></div>
        </div>
    </div>

    <script>
        // Get bookings from localStorage
        function getBookings() {
            const bookings = localStorage.getItem('airgo_bookings');
            return bookings ? JSON.parse(bookings) : [];
        }

        // Calculate days until flight
        function getDaysUntil(dateStr) {
            const flightDate = new Date(dateStr);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            flightDate.setHours(0, 0, 0, 0);
            const diffTime = flightDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays;
        }

        // Format countdown
        function formatCountdown(dateStr) {
            const days = getDaysUntil(dateStr);
            
            if (days < 0) return null;
            if (days === 0) return '🔥 DEPARTING TODAY';
            if (days === 1) return '⚡ DEPARTING TOMORROW';
            if (days <= 3) return `⏰ ${days} DAYS TO DEPARTURE`;
            if (days <= 7) return `📅 ${days} DAYS TO GO`;
            
            const weeks = Math.floor(days / 7);
            return `🗓️ ${weeks} ${weeks === 1 ? 'WEEK' : 'WEEKS'} AWAY`;
        }

        // Calculate traveler status (Reward System)
        function calculateTravelerStatus(bookings) {
            const completed = bookings.filter(b => getDaysUntil(b.flightDate || b.bookingDate) < 0);
            const upcoming = bookings.filter(b => getDaysUntil(b.flightDate || b.bookingDate) >= 0);
            
            const perks = [];
            let status = "NEW TRAVELER";

            if (completed.length >= 5) {
                status = "FREQUENT FLYER";
                perks.push({ icon: "🎯", text: "Priority disruption alerts" });
                perks.push({ icon: "⚡", text: "Faster rebooking" });
            } else if (completed.length >= 2) {
                status = "VERIFIED TRAVELER";
                perks.push({ icon: "✅", text: "Trusted passenger status" });
            }

            // Early booking reward
            const earlyBookings = bookings.filter(b => {
                const bookTime = new Date(b.bookingDate);
                const flightTime = new Date(b.flightDate || b.bookingDate);
                const daysBefore = (flightTime - bookTime) / (1000 * 60 * 60 * 24);
                return daysBefore > 7;
            });

            if (earlyBookings.length >= 2) {
                perks.push({ icon: "🎁", text: "Early bird - Better recommendations" });
            }

            // Profile completion
            if (bookings.length > 0 && bookings[0].email && bookings[0].passengerName) {
                perks.push({ icon: "🚀", text: "Complete profile - Express checkout" });
            }

            return { status, perks };
        }

        // Add to Google Calendar
        function addToCalendar(booking) {
            const startDate = new Date(booking.flightDate || booking.bookingDate || Date.now());
            const title = `Flight: ${booking.airline} ${booking.flightNumber}`;
            const details = `Route: ${booking.origin} → ${booking.destination}%0ABooking Ref: ${booking.bookingReference}%0APrice: ${booking.price}%0A%0A⚠️ CHECK-IN REMINDER:%0A• Check-in opens 24hrs before%0A• Arrive 2hrs early%0A• Bring valid ID`;
            const location = `${booking.origin} Airport`;
            
            const formatGCal = (date) => {
                return date.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
            };
            
            const start = formatGCal(startDate);
            const end = formatGCal(new Date(startDate.getTime() + 2 * 60 * 60 * 1000));
            
            const calendarUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${start}/${end}&details=${details}&location=${encodeURIComponent(location)}`;
            
            window.open(calendarUrl, '_blank');
        }

        // Share flight details (replaces broken mailto)
        function emailReminder(booking) {
            const flightDate = booking.flightDate || booking.bookingDate || 'TBA';
            const displayDate = new Date(flightDate).toLocaleDateString('en-NG', {
                weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
            });
            
            const details = 
`AIRGO FLIGHT DETAILS
━━━━━━━━━━━━━━━━━━
Airline: ${booking.airline}
Flight: ${booking.flightNumber}
Route: ${booking.origin} → ${booking.destination}
Date: ${displayDate}
Departure: ${booking.departureTime || 'TBA'}
Arrival: ${booking.arrivalTime || 'TBA'}
Passenger: ${booking.passengerName}
Booking Ref: ${booking.bookingReference}
Price: ${booking.price}

PRE-FLIGHT CHECKLIST:
• Check-in opens 24 hours before departure
• Arrive at airport 2 hours early
• Valid ID required
• Lagos traffic: Plan 3+ hours from mainland`;

            // Try native share first (works on mobile)
            if (navigator.share) {
                navigator.share({
                    title: `Flight: ${booking.airline} ${booking.flightNumber}`,
                    text: details
                }).catch(() => {
                    // Fallback: copy to clipboard
                    copyFlightDetails(details);
                });
            } else {
                // Desktop: copy to clipboard
                copyFlightDetails(details);
            }
        }

        // Copy to clipboard with feedback
        function copyFlightDetails(text) {
            navigator.clipboard.writeText(text).then(() => {
                // Show a brief toast notification
                const toast = document.createElement('div');
                toast.textContent = '✅ Flight details copied to clipboard!';
                toast.style.cssText = `
                    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
                    background: linear-gradient(135deg, #00c9a7, #06d6a0); color: #0a0e27;
                    padding: 14px 28px; border-radius: 50px; font-family: 'Orbitron', sans-serif;
                    font-size: 13px; font-weight: 700; z-index: 10000;
                    box-shadow: 0 8px 25px rgba(0, 201, 167, 0.5);
                    animation: slideUp 0.3s ease;
                `;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2500);
            }).catch(() => {
                alert(text);
            });
        }

        // Create trip card
        function createTripCard(booking) {
            // Use flightDate (actual travel date) if available, fall back to bookingDate
            const displayDate = booking.flightDate || booking.bookingDate;
            const isUpcoming = getDaysUntil(displayDate) >= 0;
            const countdown = formatCountdown(displayDate);

            return `
                <div class="trip-card">
                    ${countdown ? `<div class="countdown">${countdown}</div>` : ''}
                    
                    <div class="trip-status ${isUpcoming ? 'upcoming' : 'completed'}">
                        ${isUpcoming ? '✈️ CONFIRMED' : '✓ COMPLETED'}
                    </div>
                    
                    <div class="flight-header">
                        <div class="trip-airline">${booking.airline}</div>
                        <div class="trip-flight-number">Flight ${booking.flightNumber}</div>
                    </div>

                    <div class="trip-route">
                        <div class="trip-location">
                            <div class="trip-city">${booking.origin}</div>
                            <div class="trip-time">${booking.departureTime || 'TBA'}</div>
                        </div>
                        <div class="trip-arrow">✈️</div>
                        <div class="trip-location">
                            <div class="trip-city">${booking.destination}</div>
                            <div class="trip-time">${booking.arrivalTime || 'TBA'}</div>
                        </div>
                    </div>

                    <div class="trip-details">
                        <div class="trip-detail-item">
                            <span class="trip-detail-label">Flight Date</span>
                            <span class="trip-detail-value">${new Date(displayDate).toLocaleDateString('en-NG', {weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'})}</span>
                        </div>
                        <div class="trip-detail-item">
                            <span class="trip-detail-label">Booking Ref</span>
                            <span class="trip-detail-value">${booking.bookingReference}</span>
                        </div>
                        <div class="trip-detail-item">
                            <span class="trip-detail-label">Passenger</span>
                            <span class="trip-detail-value">${booking.passengerName}</span>
                        </div>
                        <div class="trip-detail-item">
                            <span class="trip-detail-label">Amount</span>
                            <span class="trip-detail-value">${booking.price}</span>
                        </div>
                    </div>

                    <div class="trip-actions">
                        <button class="trip-btn trip-btn-primary" onclick='addToCalendar(${JSON.stringify(booking).replace(/'/g, "\\'")})'> 
                            📅 Add to Calendar
                        </button>
                        <button class="trip-btn trip-btn-secondary" onclick='emailReminder(${JSON.stringify(booking).replace(/'/g, "\\'")})'> 
                            📋 Share Details
                        </button>
                    </div>
                </div>
            `;
        }

        // Render dashboard
        function renderDashboard() {
            const bookings = getBookings();
            
            if (bookings.length === 0) {
                document.getElementById('upcomingSection').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">✈️</div>
                        <h3>NO FLIGHTS BOOKED</h3>
                        <p>Start your journey by booking your first flight with AIRGO</p>
                        <a href="index.html" class="empty-state-btn">Search Flights</a>
                    </div>
                `;
                document.getElementById('pastSection').style.display = 'none';
                return;
            }

            const upcoming = bookings.filter(b => getDaysUntil(b.flightDate || b.bookingDate) >= 0);
            const past = bookings.filter(b => getDaysUntil(b.flightDate || b.bookingDate) < 0);

            // Calculate traveler status
            const { status, perks } = calculateTravelerStatus(bookings);
            
            if (perks.length > 0) {
                document.getElementById('statusCard').style.display = 'block';
                document.getElementById('statusBadge').textContent = status;
                document.getElementById('statusPerks').innerHTML = perks.map(perk => 
                    `<div class="perk-item">
                        <span class="perk-icon">${perk.icon}</span>
                        <span>${perk.text}</span>
                    </div>`
                ).join('');
            }

            // Update stats
            document.getElementById('upcomingCount').textContent = upcoming.length;
            document.getElementById('completedCount').textContent = past.length;
            
            const totalSpent = bookings.reduce((sum, b) => {
                const price = parseFloat(b.price.replace(/[^0-9.]/g, ''));
                return sum + price;
            }, 0);
            document.getElementById('totalSpent').textContent = `₦${totalSpent.toLocaleString()}`;

            // On-time rate (mock - in real app track actual check-ins)
            const onTimeRate = bookings.length >= 2 ? "100%" : "--";
            document.getElementById('onTimeRate').textContent = onTimeRate;

            // Render upcoming trips
            if (upcoming.length > 0) {
                document.getElementById('upcomingTrips').innerHTML = upcoming
                    .sort((a, b) => new Date(a.flightDate || a.bookingDate) - new Date(b.flightDate || b.bookingDate))
                    .map(createTripCard)
                    .join('');
            } else {
                document.getElementById('upcomingSection').innerHTML = `
                    <h2 class="section-title">🛫 UPCOMING FLIGHTS</h2>
                    <div class="empty-state">
                        <div class="empty-state-icon">📅</div>
                        <h3>NO UPCOMING FLIGHTS</h3>
                        <p>Book your next adventure and earn traveler rewards!</p>
                        <a href="index.html" class="empty-state-btn">Search Flights</a>
                    </div>
                `;
            }

            // Render past trips
            if (past.length > 0) {
                document.getElementById('pastTrips').innerHTML = past
                    .sort((a, b) => new Date(b.flightDate || b.bookingDate) - new Date(a.flightDate || a.bookingDate))
                    .map(createTripCard)
                    .join('');
            } else {
                document.getElementById('pastSection').style.display = 'none';
            }
        }

        // Initialize
        renderDashboard();
    </script>
</body>
</html>
